name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --exclude=__pycache__
        continue-on-error: true
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=term-missing || echo "Some tests failed but continuing..."
        continue-on-error: true
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v || echo "Some integration tests failed but continuing..."
        continue-on-error: true
      
      - name: Build verification
        run: |
          python -c "from src.main import app; print('Application imports successfully')"
      
      - name: Build Docker image
        run: |
          docker build -t ecu-log-visualizer:${{ github.sha }} -t ecu-log-visualizer:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 ecu-log-visualizer:latest
          sleep 15
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container
          docker rm test-container
        continue-on-error: true
