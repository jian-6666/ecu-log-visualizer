<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline Dashboard - ECU Log Visualizer</title>
    <link rel="stylesheet" href="engineering-dashboard-v3.css">
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="header-title">ECU Log Visualizer</h1>
                <span class="header-subtitle">DevOps Pipeline Dashboard</span>
            </div>
            <div class="header-right">
                <span class="last-update" id="lastUpdate">Last update: Never</span>
                <button class="btn-refresh" id="refreshButton">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="dashboard-main">
        <!-- Full Pipeline Visualization (Top, Full Width, Prominent) -->
        <section class="pipeline-section">
            <h2 class="section-title-main">Complete CI/CD Pipeline</h2>
            <div class="pipeline-flow" id="pipelineFlow">
                <!-- Detailed pipeline steps will be inserted here -->
            </div>
        </section>

        <!-- Main Content Grid (Balanced 2-column layout) -->
        <div class="main-grid">
            <!-- Left Column: Engineering Activity Log -->
            <section class="activity-log-section">
                <div class="section-header">
                    <h2 class="section-title">Engineering Activity Log</h2>
                    <span class="event-count" id="eventCount">0 events</span>
                </div>
                <div class="activity-log-content" id="activityLogContent">
                    <div class="loading-state">Loading activity...</div>
                </div>
            </section>

            <!-- Right Column: Status Panels -->
            <div class="status-panels">
                <!-- Current Build Status -->
                <div class="status-card build-status-card">
                    <div class="card-header">
                        <h3 class="card-title">Current Build Status</h3>
                        <span class="status-badge" id="buildStatusBadge">Unknown</span>
                    </div>
                    <div class="card-content" id="buildStatusContent">
                        <div class="loading-state">Loading...</div>
                    </div>
                </div>

                <!-- Docker Image Info -->
                <div class="status-card docker-card">
                    <div class="card-header">
                        <h3 class="card-title">Docker Image</h3>
                    </div>
                    <div class="card-content" id="dockerCardContent">
                        <div class="loading-state">Loading...</div>
                    </div>
                </div>

                <!-- Deployment Status -->
                <div class="status-card deployment-card">
                    <div class="card-header">
                        <h3 class="card-title">Deployment Status</h3>
                        <span class="status-badge" id="deploymentStatusBadge">Unknown</span>
                    </div>
                    <div class="card-content" id="deploymentCardContent">
                        <div class="loading-state">Loading...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Section: Repository Stats -->
        <section class="repo-stats-section">
            <div class="stats-grid" id="repoStatsGrid">
                <!-- Stats will be inserted here -->
            </div>
        </section>
    </main>

    <script src="engineering-dashboard-v3.js"></script>
</body>
</html>
